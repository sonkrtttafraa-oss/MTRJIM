<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="أحاسيس">
<link rel="manifest" href="manifest.json">
<title>مترجم الأحاسيس — تطبيق الأم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a1a; --card:#13132a; --surface:#1c1c3a;
  --purple:#c084fc; --purple-dark:#7c3aed;
  --pink:#f472b6; --green:#34d399; --amber:#fbbf24;
  --red:#f87171; --text:#e2e8f0; --muted:#64748b;
  --border:rgba(192,132,252,0.15); --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:80px;}

.header{background:linear-gradient(135deg,#1a0533,#0a0a1a);padding:50px 20px 24px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(192,132,252,0.2),transparent);border-radius:50%;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.app-name{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.notif-btn{width:40px;height:40px;background:rgba(192,132,252,0.1);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}

.current-card{background:rgba(192,132,252,0.08);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
.current-label{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:1px;}
.current-emoji{font-size:56px;margin-bottom:8px;display:block;transition:all 0.4s;}
.current-emotion{font-size:22px;font-weight:700;color:#fff;text-transform:capitalize;margin-bottom:4px;}
.current-time{font-size:12px;color:var(--muted);}
.current-conf{display:inline-block;background:rgba(192,132,252,0.15);color:var(--purple);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px;}

/* مؤشر الاتصال */
.conn-bar{margin:12px 16px 0;padding:10px 14px;border-radius:12px;font-size:12px;display:flex;align-items:center;gap:8px;}
.conn-on{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2);}
.conn-off{background:rgba(251,191,36,0.1);color:var(--amber);border:1px solid rgba(251,191,36,0.2);}
.blink{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* طوارئ */
.emergency{margin:16px;background:linear-gradient(135deg,rgba(248,113,113,0.15),rgba(251,191,36,0.1));border:1px solid rgba(248,113,113,0.4);border-radius:var(--radius);padding:16px;display:none;align-items:center;gap:12px;animation:pulseBorder 2s ease-in-out infinite;}
@keyframes pulseBorder{0%,100%{border-color:rgba(248,113,113,0.4)}50%{border-color:rgba(248,113,113,0.9)}}
.emergency.show{display:flex;}
.em-icon{font-size:28px;flex-shrink:0;}
.em-text{flex:1;}
.em-title{font-size:14px;font-weight:700;color:var(--red);}
.em-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.em-dismiss{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;width:auto;}

.section{padding:0 16px;margin-top:20px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-title{font-size:16px;font-weight:700;color:#fff;}
.section-action{font-size:12px;color:var(--purple);cursor:pointer;background:none;border:none;font-family:'Tajawal',sans-serif;width:auto;padding:0;}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 10px;text-align:center;}
.stat-emoji{font-size:24px;margin-bottom:6px;display:block;}
.stat-count{font-size:22px;font-weight:900;color:#fff;}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;}

.log-list{display:flex;flex-direction:column;gap:8px;}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.log-item.urgent{border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.05);}
.log-ew{width:44px;height:44px;border-radius:50%;background:rgba(192,132,252,0.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.log-ew.urgent{background:rgba(248,113,113,0.15);}
.log-info{flex:1;}
.log-emotion{font-size:14px;font-weight:700;color:#fff;text-transform:capitalize;}
.log-emotion-ar{font-size:12px;color:var(--muted);}
.log-time{font-size:11px;color:var(--muted);margin-top:2px;}
.log-conf{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;background:rgba(192,132,252,0.12);color:var(--purple);}
.log-conf.urgent{background:rgba(248,113,113,0.15);color:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.empty-state .icon{font-size:48px;margin-bottom:12px;display:block;opacity:0.5;}

.export-btn{width:calc(100% - 32px);margin:16px;padding:14px;background:linear-gradient(135deg,var(--purple-dark),var(--purple));border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(19,19,42,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:10px 0 20px;display:flex;justify-content:space-around;}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:10px;padding:4px 20px;width:auto;}
.tab-btn.active{color:var(--purple);}
.tab-icon{font-size:22px;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 20px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;z-index:1000;opacity:0;transition:opacity 0.3s,top 0.3s;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
.toast.show{opacity:1;top:30px;}

/* نبضة عند وصول بيانات جديدة */
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.pop{animation:pop 0.4s ease;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-name">🧠 مترجم الأحاسيس</div>
    <div class="notif-btn" onclick="requestNotif()" title="تفعيل الإشعارات">🔔</div>
  </div>
  <div class="current-card">
    <div class="current-label">◉ آخر حالة مرصودة</div>
    <span class="current-emoji" id="cur-emoji">😶</span>
    <div class="current-emotion" id="cur-emotion">في الانتظار</div>
    <div class="current-time" id="cur-time">لم يُرصد شيء بعد</div>
    <span class="current-conf" id="cur-conf">—</span>
  </div>
</div>

<!-- مؤشر الاتصال -->
<div class="conn-bar conn-off" id="conn-bar">
  <div class="blink"></div>
  <span id="conn-text">في انتظار بيانات من الكمبيوتر...</span>
</div>

<!-- طوارئ -->
<div class="emergency" id="emergency">
  <div class="em-icon">🚨</div>
  <div class="em-text">
    <div class="em-title" id="em-title">تنبيه طوارئ!</div>
    <div class="em-sub" id="em-sub">استمر شعور سلبي لأكثر من دقيقتين</div>
  </div>
  <button class="em-dismiss" onclick="document.getElementById('emergency').classList.remove('show')">✕</button>
</div>

<!-- إحصائيات -->
<div class="section">
  <div class="section-header">
    <div class="section-title">إحصائيات اليوم</div>
    <button class="section-action" onclick="clearLog()">مسح</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><span class="stat-emoji">😊</span><div class="stat-count" id="s-pos">0</div><div class="stat-label">إيجابي</div></div>
    <div class="stat-card"><span class="stat-emoji">😐</span><div class="stat-count" id="s-neu">0</div><div class="stat-label">محايد</div></div>
    <div class="stat-card"><span class="stat-emoji">😢</span><div class="stat-count" id="s-neg">0</div><div class="stat-label">سلبي</div></div>
  </div>
</div>

<!-- السجل -->
<div class="section">
  <div class="section-header">
    <div class="section-title">سجل المشاعر</div>
    <span style="font-size:11px;color:var(--muted)" id="log-count">0 سجل</span>
  </div>
  <div class="log-list" id="log-list">
    <div class="empty-state"><span class="icon">📋</span>لم يُرصد أي مشاعر بعد<br><small>افتحي الكمبيوتر وابدئي التحليل</small></div>
  </div>
</div>

<button class="export-btn" onclick="exportCSV()">📊 تصدير السجل لملف Excel</button>

<div class="bottom-bar">
  <button class="tab-btn active"><span class="tab-icon">🏠</span>الرئيسية</button>
  <button class="tab-btn"><span class="tab-icon">📈</span>التقارير</button>
  <button class="tab-btn"><span class="tab-icon">⚙️</span>الإعدادات</button>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK — يراقب قاعدة البيانات ويتحدث فوراً عند أي تغيير -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0UVNMp4FTkJ-IGZrrInUYVWMADdgXZgc",
  authDomain: "mutarjim-ead8c.firebaseapp.com",
  databaseURL: "https://mutarjim-ead8c-default-rtdb.firebaseio.com",
  projectId: "mutarjim-ead8c",
  storageBucket: "mutarjim-ead8c.firebasestorage.app",
  messagingSenderId: "223654664163",
  appId: "1:223654664163:web:1f186866a25808262eb2d6"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

const emojiMap = {happy:"😊",sad:"😢",angry:"😠",surprised:"😲",neutral:"😐",fear:"😨",disgust:"🤢",contempt:"😒"};
const arMap = {happy:"سعيد",sad:"حزين",angry:"غاضب",surprised:"مندهش",neutral:"محايد",fear:"خائف",disgust:"اشمئزاز",contempt:"ازدراء"};
const negatives = ['sad','angry','fear','disgust','contempt'];
const positives = ['happy','surprised'];

let moodLog = JSON.parse(localStorage.getItem('moodLog_v2') || '[]');
let negStart = null, negStreak = 0, lastTimestamp = 0;

// ===== onValue = يراقب "latest" ويُنفَّذ فوراً عند أي تغيير =====
// هذا القلب: كل ما يرسل الكمبيوتر نتيجة، يستقبلها الهاتف هنا
onValue(ref(db, 'latest'), (snapshot) => {
  if (!snapshot.exists()) return;
  const data = snapshot.val();

  // نتجاهل لو نفس البيانات (ما تغير شيء)
  if (data.timestamp === lastTimestamp) return;
  lastTimestamp = data.timestamp;

  const { emotion, confidence, time, date } = data;
  const key = emotion.toLowerCase();

  // تحديث البطاقة الرئيسية
  const emojiEl = document.getElementById('cur-emoji');
  emojiEl.textContent = emojiMap[key] || '🤔';
  emojiEl.classList.remove('pop');
  void emojiEl.offsetWidth; // إعادة تشغيل الأنيميشن
  emojiEl.classList.add('pop');

  document.getElementById('cur-emotion').textContent = emotion;
  document.getElementById('cur-time').textContent = 'آخر رصد: ' + time;
  document.getElementById('cur-conf').textContent = 'ثقة: ' + confidence + '%';

  // تحديث مؤشر الاتصال
  const bar = document.getElementById('conn-bar');
  bar.className = 'conn-bar conn-on';
  document.getElementById('conn-text').textContent = '● متصل — آخر تحديث: ' + time;

  // إضافة للسجل المحلي
  const entry = { emotion, confidence, time, date, timestamp: data.timestamp };
  moodLog.unshift(entry);
  if (moodLog.length > 200) moodLog = moodLog.slice(0, 200); // نحتفظ بأخر 200
  localStorage.setItem('moodLog_v2', JSON.stringify(moodLog));

  renderLog();
  updateStats();
  checkEmergency(key, emotion);

  // إشعار للهاتف
  if (Notification.permission === 'granted') {
    new Notification('🧠 مترجم الأحاسيس', {
      body: 'طفلك يشعر بـ' + (arMap[key]||emotion) + ' — ثقة: ' + confidence + '%',
      icon: '/icon-192.png',
      tag: 'emotion'
    });
  }
});

function checkEmergency(key, emotion) {
  if (negatives.includes(key)) {
    if (!negStart) negStart = Date.now();
    const mins = (Date.now() - negStart) / 60000;
    negStreak++;
    if (mins >= 2) {
      document.getElementById('emergency').classList.add('show');
      document.getElementById('em-title').textContent = '🚨 شعور مستمر!';
      document.getElementById('em-sub').textContent = 'طفلك يشعر بـ"' + (arMap[key]||emotion) + '" منذ أكثر من دقيقتين';
      if (Notification.permission === 'granted') {
        new Notification('🚨 تنبيه طوارئ', {
          body: 'طفلك يشعر بـ"' + (arMap[key]||emotion) + '" منذ أكثر من دقيقتين!',
          requireInteraction: true,
          tag: 'emergency'
        });
      }
    }
  } else {
    negStart = null; negStreak = 0;
    document.getElementById('emergency').classList.remove('show');
  }
}

function renderLog() {
  const list = document.getElementById('log-list');
  document.getElementById('log-count').textContent = moodLog.length + ' سجل';
  if (moodLog.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="icon">📋</span>لم يُرصد أي مشاعر بعد</div>`;
    return;
  }
  list.innerHTML = moodLog.slice(0, 30).map(e => {
    const k = e.emotion.toLowerCase();
    const urg = negatives.includes(k);
    return `<div class="log-item ${urg?'urgent':''}">
      <div class="log-ew ${urg?'urgent':''}">${emojiMap[k]||'🤔'}</div>
      <div class="log-info">
        <div class="log-emotion">${e.emotion}</div>
        <div class="log-emotion-ar">${arMap[k]||e.emotion}</div>
        <div class="log-time">🕐 ${e.time} — ${e.date}</div>
      </div>
      <div class="log-conf ${urg?'urgent':''}">${e.confidence}%</div>
    </div>`;
  }).join('');
}

function updateStats() {
  let pos=0,neu=0,neg=0;
  moodLog.forEach(e=>{
    const k=e.emotion.toLowerCase();
    if(positives.includes(k)) pos++;
    else if(negatives.includes(k)) neg++;
    else neu++;
  });
  document.getElementById('s-pos').textContent=pos;
  document.getElementById('s-neu').textContent=neu;
  document.getElementById('s-neg').textContent=neg;
}

window.clearLog = function() {
  if(!confirm('مسح كل السجل؟')) return;
  moodLog=[];
  localStorage.removeItem('moodLog_v2');
  renderLog(); updateStats();
  showToast('🗑️ تم مسح السجل');
};

window.exportCSV = function() {
  if(moodLog.length===0){showToast('⚠️ السجل فارغ!');return;}
  let csv='التاريخ,الوقت,المشاعر,بالعربي,الثقة\n';
  moodLog.forEach(e=>{
    const k=e.emotion.toLowerCase();
    csv+=`${e.date},${e.time},${e.emotion},${arMap[k]||e.emotion},${e.confidence}%\n`;
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='سجل_المشاعر_'+new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')+'.csv';
  a.click();
  showToast('✅ تم تحميل الملف!');
};

// تحميل السجل المحلي عند الفتح
renderLog(); updateStats();
</script>

<script>
async function requestNotif() {
  const r = await Notification.requestPermission();
  if(r==='granted') showToast('✅ الإشعارات مفعّلة!');
  else showToast('⚠️ الرجاء السماح بالإشعارات');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
